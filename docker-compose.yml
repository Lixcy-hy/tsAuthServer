version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: ahuan-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-location_service}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ahuan-net

  redis:
    image: redis:7-alpine
    container_name: ahuan-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis123}
    volumes:
      - redisdata:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis123}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ahuan-net

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ahuan-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_PORT: 8080
      APP_VERSION: 1.0.0
      # 容器内通过服务名访问
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-location_service}?options=-c%20search_path%3Dmocklocation
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis123}@redis:6379/0
      TOKEN_SECRET: ${TOKEN_SECRET:-change-me-in-production}
      TOKEN_EXPIRE_DAYS: ${TOKEN_EXPIRE_DAYS:-30}
      ADMIN_BOOTSTRAP_SECRET: ${ADMIN_BOOTSTRAP_SECRET:-bootstrap-secret-change-me}
      AMAP_KEY: ${AMAP_KEY:-}
      PLACE_SEARCH_LIMIT_PER_MINUTE: ${PLACE_SEARCH_LIMIT_PER_MINUTE:-60}
      LOGIN_LIMIT_PER_MINUTE: ${LOGIN_LIMIT_PER_MINUTE:-10}
    ports:
      - "${APP_PORT:-8080}:8080"
    networks:
      - ahuan-net

volumes:
  pgdata:
  redisdata:

networks:
  ahuan-net:
    driver: bridge
