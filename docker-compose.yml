# ============================================
# 部署配置：仅打包本应用，连接已有的外部 PG/Redis
# ============================================
#
# 使用方法：
#   1) cp .env.docker .env  （或直接编辑 .env）
#   2) 在 .env 里填好 DATABASE_URL / REDIS_URL（指向你已经部署好的数据库）
#   3) bun run docker:up
#
# 注意：环境变量中引用 ${VAR:-default} 的方式要求变量在 .env 里存在，
# 留空即可；务必把密码 / token 等敏感信息放在 .env（已在 .gitignore 中排除）。

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ahuan-toolbox-server:latest
    container_name: ahuan-app
    restart: unless-stopped

    # 所有连接信息都走 .env，应用本身不关心 DB/Redis 在哪
    env_file:
      - path: .env
        required: false
    environment:
      # 监听端口
      APP_PORT: ${APP_PORT:-8080}
      APP_VERSION: ${APP_VERSION:-1.0.0}

      # 数据库与缓存：直接复用宿主机 / 远端已有的服务
      # 留空时 config.ts 会用各自的本地默认值（仅用于本地裸跑，不推荐生产）
      DATABASE_URL: ${DATABASE_URL:-}
      REDIS_URL: ${REDIS_URL:-}

      # 业务配置
      TOKEN_SECRET: ${TOKEN_SECRET:-}
      TOKEN_EXPIRE_DAYS: ${TOKEN_EXPIRE_DAYS:-30}
      AMAP_KEY: ${AMAP_KEY:-}
      PG_SCHEMA: ${PG_SCHEMA:-mocklocation}

      # 限流
      PLACE_SEARCH_LIMIT_PER_MINUTE: ${PLACE_SEARCH_LIMIT_PER_MINUTE:-60}
      LOGIN_LIMIT_PER_MINUTE: ${LOGIN_LIMIT_PER_MINUTE:-10}

      # 时区
      TZ: ${TZ:-Asia/Shanghai}

    ports:
      # 把容器内的 8080 暴露到宿主机；如已有反向代理可只绑 127.0.0.1
      - "${APP_PORT:-8080}:8080"

    # 如需要让容器访问宿主机上的 PG/Redis（host 网络或 host.docker.internal），
    # 把下面的注释打开：
    # extra_hosts:
    #   - "host.docker.internal:host-gateway"

    # 健康检查（与 Dockerfile 内置的互补，docker compose 自己用）
    healthcheck:
      test:
        - "CMD-SHELL"
        - "wget -qO- http://localhost:8080/api/v1/health >/dev/null 2>&1 || exit 1"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

    # 日志策略：限制单个日志文件 10M、最多保留 3 份，避免撑爆磁盘
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

# 没有 volumes / networks：所有持久化由外部 DB 负责，容器是无状态的
