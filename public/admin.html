<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>账号管理 - 阿桓工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script
      crossorigin
      src="https://unpkg.com/react@18/umd/react.production.min.js"
    ></script>
    <script
      crossorigin
      src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"
    ></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
          "Microsoft YaHei", sans-serif;
      }
      .modal-backdrop {
        backdrop-filter: blur(4px);
      }
      .spinner {
        border: 2px solid #f3f3f3;
        border-top: 2px solid #3498db;
        border-radius: 50%;
        width: 16px;
        height: 16px;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body class="bg-gray-50 min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
      const { useState, useEffect, useCallback } = React;

      const API = {
        base: window.location.origin + "/api/v1",
        getToken() {
          return localStorage.getItem("admin_token") || "";
        },
        setToken(t) {
          if (t) localStorage.setItem("admin_token", t);
          else localStorage.removeItem("admin_token");
        },
        async request(path, opts = {}) {
          const token = this.getToken();
          const headers = {
            "Content-Type": "application/json",
            ...(token ? { Authorization: "Bearer " + token } : {}),
            ...(opts.headers || {}),
          };
          const res = await fetch(this.base + path, { ...opts, headers });
          const json = await res.json();
          if (json.code !== 0) throw new Error(json.message || "请求失败");
          return json;
        },
        login(a, p) {
          return this.request("/auth/login", {
            method: "POST",
            body: JSON.stringify({ account: a, password: p }),
          });
        },
        listUsers(params) {
          return this.request(
            "/admin/users?" + new URLSearchParams(params).toString(),
          );
        },
        createUser(data) {
          return this.request("/admin/users", {
            method: "POST",
            body: JSON.stringify(data),
          });
        },
        updateUser(id, data) {
          return this.request("/admin/users/" + id, {
            method: "PATCH",
            body: JSON.stringify(data),
          });
        },
        deleteUser(id) {
          return this.request("/admin/users/" + id, { method: "DELETE" });
        },
        getStats() {
          return this.request("/admin/stats");
        },
      };

      function Toast({ msg, type, onClose }) {
        useEffect(() => {
          const t = setTimeout(onClose, 3000);
          return () => clearTimeout(t);
        }, []);
        const c = {
          success: "bg-green-500",
          error: "bg-red-500",
          info: "bg-blue-500",
        };
        return (
          <div
            className={`fixed top-4 right-4 z-50 ${c[type] || c.info} text-white px-4 py-2 rounded shadow-lg`}
          >
            {msg}
          </div>
        );
      }

      function Modal({ open, onClose, title, children }) {
        if (!open) return null;
        return (
          <div className="fixed inset-0 z-40 flex items-center justify-center modal-backdrop bg-black/30">
            <div className="bg-white rounded-lg shadow-xl w-full max-w-md mx-4">
              <div className="flex justify-between items-center px-6 py-4 border-b">
                <h3 className="text-lg font-semibold">{title}</h3>
                <button
                  onClick={onClose}
                  className="text-gray-400 hover:text-gray-600 text-2xl leading-none"
                >
                  &times;
                </button>
              </div>
              <div className="px-6 py-4">{children}</div>
            </div>
          </div>
        );
      }

      function LoginPage({ onLogin }) {
        const [account, setAccount] = useState("");
        const [password, setPassword] = useState("");
        const [loading, setLoading] = useState(false);
        const [err, setErr] = useState("");
        const submit = async (e) => {
          e.preventDefault();
          setLoading(true);
          setErr("");
          try {
            const json = await API.login(account, password);
            API.setToken(json.data.token);
            onLogin(json.data.user);
          } catch (e) {
            setErr(e.message);
          } finally {
            setLoading(false);
          }
        };
        return (
          <div className="min-h-screen flex items-center justify-center bg-gradient-to-br from-blue-50 to-indigo-100">
            <form
              onSubmit={submit}
              className="bg-white p-8 rounded-lg shadow-lg w-full max-w-sm"
            >
              <h1 className="text-2xl font-bold text-center mb-6 text-gray-800">
                账号管理后台
              </h1>
              <div className="mb-4">
                <label className="block text-sm text-gray-600 mb-1">账号</label>
                <input
                  type="text"
                  value={account}
                  onChange={(e) => setAccount(e.target.value)}
                  className="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:border-blue-500"
                  placeholder="admin"
                  required
                />
              </div>
              <div className="mb-4">
                <label className="block text-sm text-gray-600 mb-1">密码</label>
                <input
                  type="password"
                  value={password}
                  onChange={(e) => setPassword(e.target.value)}
                  className="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:border-blue-500"
                  placeholder="••••••"
                  required
                />
              </div>
              {err && <div className="mb-4 text-red-500 text-sm">{err}</div>}
              <button
                type="submit"
                disabled={loading}
                className="w-full bg-blue-500 hover:bg-blue-600 text-white py-2 rounded transition disabled:opacity-50"
              >
                {loading ? "登录中…" : "登 录"}
              </button>
            </form>
          </div>
        );
      }

      function StatsBar({ stats }) {
        const items = [
          { label: "总用户数", value: stats.users },
          { label: "活跃用户", value: stats.activeUsers },
          { label: "管理员", value: stats.admins },
          { label: "有效 Token", value: stats.activeTokens },
          { label: "24h 搜索", value: stats.searchesLast24h },
        ];
        return (
          <div className="grid grid-cols-2 md:grid-cols-5 gap-4 mb-6">
            {items.map((it) => (
              <div key={it.label} className="bg-white rounded-lg shadow p-4">
                <div className="text-sm text-gray-500">{it.label}</div>
                <div className="text-2xl font-bold mt-1 text-gray-800">
                  {it.value ?? "-"}
                </div>
              </div>
            ))}
          </div>
        );
      }

      function UserRow({ user, onEdit, onDelete, onToggleStatus }) {
        return (
          <tr className="hover:bg-gray-50">
            <td className="px-4 py-3 text-sm text-gray-500">{user.id}</td>
            <td className="px-4 py-3 font-medium">{user.account}</td>
            <td className="px-4 py-3 text-sm text-gray-600">
              {user.name || "-"}
            </td>
            <td className="px-4 py-3">
              <span
                className={`px-2 py-1 text-xs rounded font-medium ${
                  user.role === "ADMIN"
                    ? "bg-purple-100 text-purple-700"
                    : "bg-gray-100 text-gray-600"
                }`}
              >
                {user.role === "ADMIN" ? "管理员" : "普通用户"}
              </span>
            </td>
            <td className="px-4 py-3">
              <span
                className={`px-2 py-1 text-xs rounded ${
                  user.status === "ACTIVE"
                    ? "bg-green-100 text-green-700"
                    : "bg-red-100 text-red-700"
                }`}
              >
                {user.status === "ACTIVE" ? "启用" : "禁用"}
              </span>
            </td>
            <td className="px-4 py-3 text-sm text-gray-500">
              {new Date(user.created_at).toLocaleString("zh-CN")}
            </td>
            <td className="px-4 py-3 text-right">
              <button
                onClick={() => onToggleStatus(user)}
                className="text-xs px-2 py-1 mr-1 text-yellow-600 hover:bg-yellow-50 rounded"
              >
                {user.status === "ACTIVE" ? "禁用" : "启用"}
              </button>
              <button
                onClick={() => onEdit(user)}
                className="text-xs px-2 py-1 mr-1 text-blue-600 hover:bg-blue-50 rounded"
              >
                编辑
              </button>
              <button
                onClick={() => onDelete(user)}
                className="text-xs px-2 py-1 text-red-600 hover:bg-red-50 rounded"
              >
                删除
              </button>
            </td>
          </tr>
        );
      }

      function UserForm({ initial, onSave, onCancel }) {
        const [account, setAccount] = useState(initial?.account || "");
        const [password, setPassword] = useState("");
        const [name, setName] = useState(initial?.name || "");
        const [role, setRole] = useState(initial?.role || "USER");
        const [loading, setLoading] = useState(false);
        const [err, setErr] = useState("");
        const submit = async (e) => {
          e.preventDefault();
          setLoading(true);
          setErr("");
          try {
            if (initial) {
              const data = { name, role };
              if (password) data.password = password;
              await onSave(data);
            } else {
              await onSave({ account, password, name, role });
            }
          } catch (e) {
            setErr(e.message);
          } finally {
            setLoading(false);
          }
        };
        return (
          <form onSubmit={submit}>
            {!initial && (
              <div className="mb-3">
                <label className="block text-sm text-gray-600 mb-1">
                  账号 *
                </label>
                <input
                  type="text"
                  value={account}
                  onChange={(e) => setAccount(e.target.value)}
                  className="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:border-blue-500"
                  required
                  minLength={2}
                />
              </div>
            )}
            <div className="mb-3">
              <label className="block text-sm text-gray-600 mb-1">
                密码 {initial ? "（留空则不修改）" : "*"}
              </label>
              <input
                type="password"
                value={password}
                onChange={(e) => setPassword(e.target.value)}
                className="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:border-blue-500"
                required={!initial}
                minLength={6}
                placeholder="至少 6 位"
              />
            </div>
            <div className="mb-3">
              <label className="block text-sm text-gray-600 mb-1">显示名</label>
              <input
                type="text"
                value={name}
                onChange={(e) => setName(e.target.value)}
                className="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:border-blue-500"
              />
            </div>
            <div className="mb-3">
              <label className="block text-sm text-gray-600 mb-1">角色</label>
              <select
                value={role}
                onChange={(e) => setRole(e.target.value)}
                className="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:border-blue-500"
              >
                <option value="USER">普通用户</option>
                <option value="ADMIN">管理员</option>
              </select>
            </div>
            {err && <div className="mb-3 text-red-500 text-sm">{err}</div>}
            <div className="flex gap-2 mt-4">
              <button
                type="button"
                onClick={onCancel}
                className="flex-1 py-2 border border-gray-300 rounded hover:bg-gray-50"
              >
                取消
              </button>
              <button
                type="submit"
                disabled={loading}
                className="flex-1 py-2 bg-blue-500 text-white rounded hover:bg-blue-600 disabled:opacity-50"
              >
                {loading ? "保存中…" : "保存"}
              </button>
            </div>
          </form>
        );
      }

      function App() {
        const [user, setUser] = useState(null);
        const [loading, setLoading] = useState(true);
        const [users, setUsers] = useState([]);
        const [stats, setStats] = useState({});
        const [pagination, setPagination] = useState({
          page: 1,
          pageSize: 20,
          total: 0,
          totalPages: 0,
        });
        const [keyword, setKeyword] = useState("");
        const [editing, setEditing] = useState(null);
        const [creating, setCreating] = useState(false);
        const [toast, setToast] = useState(null);

        const showToast = (msg, type = "success") => setToast({ msg, type });

        useEffect(() => {
          const t = API.getToken();
          if (t) {
            fetch(API.base + "/auth/verify", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ token: t }),
            })
              .then((r) => r.json())
              .then((j) => {
                if (j.code === 0 && j.data.authorized)
                  setUser({ account: "admin" });
                else API.setToken("");
              })
              .catch(() => API.setToken(""))
              .finally(() => setLoading(false));
          } else {
            setLoading(false);
          }
        }, []);

        const fetchUsers = useCallback(
          async (page = 1) => {
            try {
              const res = await API.listUsers({ page, pageSize: 20, keyword });
              setUsers(res.data.users);
              setPagination(res.data.pagination);
            } catch (e) {
              showToast(e.message, "error");
            }
          },
          [keyword],
        );

        const fetchStats = useCallback(async () => {
          try {
            const res = await API.getStats();
            setStats(res.data);
          } catch {}
        }, []);

        useEffect(() => {
          if (user) {
            fetchUsers(1);
            fetchStats();
          }
        }, [user]);

        const handleSearch = (e) => {
          e.preventDefault();
          fetchUsers(1);
        };

        const handleSave = async (data) => {
          try {
            if (editing) {
              await API.updateUser(editing.id, data);
              showToast("更新成功");
            } else {
              await API.createUser(data);
              showToast("创建成功");
            }
            setEditing(null);
            setCreating(false);
            fetchUsers(pagination.page);
            fetchStats();
          } catch (e) {
            throw e;
          }
        };

        const handleToggleStatus = async (u) => {
          const newStatus = u.status === "ACTIVE" ? "DISABLED" : "ACTIVE";
          if (
            !confirm(
              `确定要${newStatus === "DISABLED" ? "禁用" : "启用"}账号 ${u.account} 吗？`,
            )
          )
            return;
          try {
            await API.updateUser(u.id, { status: newStatus });
            showToast(`${newStatus === "DISABLED" ? "禁用" : "启用"}成功`);
            fetchUsers(pagination.page);
            fetchStats();
          } catch (e) {
            showToast(e.message, "error");
          }
        };

        const handleDelete = async (u) => {
          if (!confirm(`确定要删除账号 ${u.account} 吗？此操作不可恢复！`))
            return;
          try {
            await API.deleteUser(u.id);
            showToast("删除成功");
            fetchUsers(pagination.page);
            fetchStats();
          } catch (e) {
            showToast(e.message, "error");
          }
        };

        const logout = () => {
          API.setToken("");
          setUser(null);
          setUsers([]);
          setStats({});
        };

        if (loading)
          return (
            <div className="min-h-screen flex items-center justify-center">
              <div className="spinner"></div>
            </div>
          );
        if (!user) return <LoginPage onLogin={setUser} />;

        return (
          <div className="min-h-screen">
            <header className="bg-white shadow-sm border-b">
              <div className="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
                <h1 className="text-xl font-bold text-gray-800">
                  🛠 账号管理后台
                </h1>
                <div className="flex items-center gap-3">
                  <span className="text-sm text-gray-500">
                    登录身份: {user.account}
                  </span>
                  <button
                    onClick={logout}
                    className="text-sm px-3 py-1 text-gray-600 hover:bg-gray-100 rounded"
                  >
                    退出
                  </button>
                </div>
              </div>
            </header>
            <main className="max-w-7xl mx-auto px-4 py-6">
              <StatsBar stats={stats} />
              <div className="bg-white rounded-lg shadow p-4 mb-4 flex gap-3 items-center">
                <form onSubmit={handleSearch} className="flex-1 flex gap-2">
                  <input
                    type="text"
                    value={keyword}
                    onChange={(e) => setKeyword(e.target.value)}
                    placeholder="搜索账号或显示名…"
                    className="flex-1 px-3 py-2 border border-gray-300 rounded focus:outline-none focus:border-blue-500"
                  />
                  <button
                    type="submit"
                    className="px-4 py-2 bg-gray-100 hover:bg-gray-200 rounded"
                  >
                    搜索
                  </button>
                </form>
                <button
                  onClick={() => setCreating(true)}
                  className="px-4 py-2 bg-blue-500 text-white rounded hover:bg-blue-600"
                >
                  + 新建用户
                </button>
              </div>
              <div className="bg-white rounded-lg shadow overflow-hidden">
                <table className="w-full">
                  <thead className="bg-gray-50 text-left text-xs text-gray-500 uppercase">
                    <tr>
                      <th className="px-4 py-3">ID</th>
                      <th className="px-4 py-3">账号</th>
                      <th className="px-4 py-3">显示名</th>
                      <th className="px-4 py-3">角色</th>
                      <th className="px-4 py-3">状态</th>
                      <th className="px-4 py-3">创建时间</th>
                      <th className="px-4 py-3 text-right">操作</th>
                    </tr>
                  </thead>
                  <tbody className="divide-y">
                    {users.length === 0 ? (
                      <tr>
                        <td
                          colSpan="7"
                          className="px-4 py-8 text-center text-gray-400"
                        >
                          暂无数据
                        </td>
                      </tr>
                    ) : (
                      users.map((u) => (
                        <UserRow
                          key={u.id}
                          user={u}
                          onEdit={setEditing}
                          onDelete={handleDelete}
                          onToggleStatus={handleToggleStatus}
                        />
                      ))
                    )}
                  </tbody>
                </table>
              </div>
              {pagination.totalPages > 1 && (
                <div className="mt-4 flex justify-center gap-2">
                  <button
                    onClick={() => fetchUsers(pagination.page - 1)}
                    disabled={pagination.page <= 1}
                    className="px-3 py-1 border rounded disabled:opacity-50"
                  >
                    上一页
                  </button>
                  <span className="px-3 py-1">
                    {pagination.page} / {pagination.totalPages} (共{" "}
                    {pagination.total} 条)
                  </span>
                  <button
                    onClick={() => fetchUsers(pagination.page + 1)}
                    disabled={pagination.page >= pagination.totalPages}
                    className="px-3 py-1 border rounded disabled:opacity-50"
                  >
                    下一页
                  </button>
                </div>
              )}
            </main>
            <Modal
              open={!!editing || creating}
              onClose={() => {
                setEditing(null);
                setCreating(false);
              }}
              title={editing ? `编辑用户 - ${editing.account}` : "新建用户"}
            >
              <UserForm
                initial={editing}
                onSave={handleSave}
                onCancel={() => {
                  setEditing(null);
                  setCreating(false);
                }}
              />
            </Modal>
            {toast && <Toast {...toast} onClose={() => setToast(null)} />}
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
