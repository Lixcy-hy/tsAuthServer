name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint & Typecheck
    runs-on: self-hosted
    env:
      # 如果 VPS 有代理，取消下面注释并填实际地址
      # HTTP_PROXY: http://127.0.0.1:7890
      # HTTPS_PROXY: http://127.0.0.1:7890
      # 如果 npm registry 慢，可以用淘宝镜像
      # BUN_CONFIG_REGISTRY: https://registry.npmmirror.com
      BUN_CONFIG_REGISTRY: https://registry.npmmirror.com
    steps:
      - uses: actions/checkout@v4

      - name: Check Bun
        run: bun --version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Biome check
        run: bun run check

      - name: Typecheck
        run: bun run typecheck

      - name: Docker build
        run: docker build -t ahuan-toolbox-server:ci-${{ github.sha }} .
