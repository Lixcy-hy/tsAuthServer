name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint & Typecheck
    runs-on: self-hosted
    env:
      BUN_CONFIG_REGISTRY: https://registry.npmmirror.com
    steps:
      - uses: actions/checkout@v4

      - name: Check Bun
        run: bun --version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Biome check
        run: bun run check

      - name: Typecheck
        run: bun run typecheck

      - name: Docker build
        run: docker build -t ahuan-toolbox-server:ci-${{ github.sha }} .
